<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeEx Space</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <header>
        <div class="container row">
            <div class="brand">
                <div class="logo"></div>
                <div class="title">CodeEx Space - Code in Browser</div>
            </div>

            <div class="row">
                <!-- 🌗 Added theme toggle button -->
                <button class="btn secondary" id="themeToggle" title="Toggle Theme">🌙</button>

                <button class="btn secondary" id="saveBtn" title="Save Work Locally"><span>Save</span></button>
                <button class="btn secondary" id="loadBtn" title="Load Work Locally"><span>Load</span></button>
                <input id="openFile" type="file" accept="application/json" hidden>
            </div>
        </div>
    </header>

    <main>

        <aside class="card stack panel">
            <h2>Task / Assignment</h2>

            <textarea id="assignment" class="text" placeholder="Write the task description here..."></textarea>

            <div class="stack">
                <label for="testArea">Validation tests (JavaScript only - optional)</label>
                <textarea id="testArea" class="text"
                    placeholder="write simple tests to append after the students' code to check the solution."></textarea>
            </div>

            <div class="muted">
                Tip: <span class="kdb">Ctrl</span> + <span class="kdb">S</span> to save,
                <span class="kdb">Ctrl</span> + <span class="kdb">Enter</span> to run.
            </div>
        </aside>

        <section class="stack" id="web-only">

            <div id="webEditors" class="stack panel card">
                <div class="row">
                    <h2>HTML / CSS / JS</h2>
                    <div class="row">
                        <button class="btn ok" id="runWeb">Run</button>
                        <button class="btn secondary" id="openPreview">Open preview in a window.</button>
                    </div>
                </div>

                <div class="tabs" id="webTabs" role="tablist" aria-label="web editors">
                    <button class="tab active" role="tab" aria-selected="true" tabindex="0"
                        data-pane="html">HTML</button>
                    <button class="tab" role="tab" aria-selected="false" tabindex="-1" data-pane="css">CSS</button>
                    <button class="tab" role="tab" aria-selected="false" tabindex="-1"
                        data-pane="js">JavaScript</button>
                </div>

                <div class="editor-wrap" data-pane="html">
                    <div id="ed_html" class="editor"></div>
                </div>

                <div class="editor-wrap" data-pane="css" hidden>
                    <div id="ed_css" class="editor"></div>
                </div>

                <div class="editor-wrap" data-pane="js" hidden>
                    <div id="ed_js" class="editor"></div>
                </div>

                <div class="stack">
                    <h3>Preview</h3>
                    <iframe id="preview" class="preview"
                        sandbox="allow-scripts allow-same-origin allow-modals allow-forms"></iframe>
                </div>

            </div>

        </section>

        <aside class="card panel stack">
            <h2>Output</h2>
            <div id="output" class="out" aria-live="polite"></div>
            <div class="row">
                <button class="btn warn" id="runTests">Run with tests</button>
                <button class="btn secondary">Clear log</button>
            </div>
            <h3>Notes</h3>
            <ul class="muted">
                <li class="label">Everything runs inside the browser in a sandbox.</li>
                <li class="label">You can save the work as a JSON file and restore it.</li>
            </ul>
        </aside>
    </main>

    <div class="footer">&copy; 2025 CodieTech - All rights reserved.</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.js"></script>
    <script src="./script.js"></script>

    <!-- 🌗 Theme toggle script -->
    <script>
        const toggle = document.getElementById("themeToggle");
        const body = document.body;

        // Load saved theme
        if (localStorage.getItem("theme") === "light") {
            body.classList.add("light");
            toggle.textContent = "☀️";
        } else {
            toggle.textContent = "🌙";
        }

        toggle.addEventListener("click", () => {
            body.classList.toggle("light");
            const isLight = body.classList.contains("light");
            toggle.textContent = isLight ? "☀️" : "🌙";
            localStorage.setItem("theme", isLight ? "light" : "dark");
        });
    </script>

</body>

</html>
